name: 실적 캘린더 자동 갱신

# 실행 조건
on:
  # 매일 한국시간 06:30, 07:00, 07:30 (UTC 21:30, 22:00, 22:30 전날)
  # 미국장 마감(KST 05:00 무렵) 직후 ~ 한국장 시작(09:00) 전 사이
  # cron 안정성 위해 3슬롯 (동일 데이터면 commit 자동 skip)
  schedule:
    - cron: '30 21 * * *'  # KST 06:30 (전일 UTC 21:30)
    - cron: '0 22 * * *'   # KST 07:00
    - cron: '30 22 * * *'  # KST 07:30

  # GitHub Actions 탭에서 수동 실행 가능
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update-earnings:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install yfinance pandas pykrx requests beautifulsoup4 lxml

      - name: 미국 실적 수집
        continue-on-error: true
        run: |
          python .github/scripts/fetch_earnings_us.py

      - name: 한국 실적 수집
        continue-on-error: true
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          python .github/scripts/fetch_earnings_kr.py

      - name: 변경사항 커밋
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/earnings-calendar-us.json public/data/earnings-calendar-kr.json public/data/stock-symbols-100-kr.json
          if git diff --staged --quiet; then
            echo "변경사항 없음 - skip"
          else
            git commit -m "실적 캘린더 자동 갱신 $(date -u +%Y%m%d)"
            git push
            echo "갱신 완료"
          fi
